---
# Main Playbook for Yii2 Application Deployment with Docker Swarm

- name: Provision server for Yii2 Application
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - vars/main.yml
  
  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
      become: true
  
  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'
      
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'
      become: true
  
  tasks:
    # Basic system setup
    - name: Include common setup tasks
      include_tasks: tasks/01-common-setup.yml
      
    # Install Docker
    - name: Include Docker setup tasks
      include_tasks: tasks/02-docker-setup.yml
      
    # Setup local Nginx reverse proxy
    - name: Setup Nginx
      include_tasks: tasks/05-nginx-setup.yml
      
    # Setup Docker Swarm
    - name: Setup Docker Swarm
      include_tasks: tasks/03-swarm-setup.yml
      
    # Prepare container environment
    - name: Container setup using prebuilt image
      include_tasks: tasks/04-container-setup.yml
      
    # Deploy the application stack
    - name: Deploy application stack
      include_tasks: tasks/06-deployment.yml
      
    # Make sure Nginx is restarted after all changes
    - name: Force Nginx restart
      service:
        name: nginx
        state: restarted
      become: true
      
    # Verify the deployment
    - name: Verify deployment
      include_tasks: tasks/07-verification.yml
      

    # Set proper permissions for web directory
    - name: Set proper permissions for web directory
      file:
        path: "{{ app_dir }}/web"
        state: directory
        owner: www-data
        group: www-data
        mode: 0755
        recurse: yes
      
    # Make sure logs directory exists with proper permissions
    - name: Make sure logs directory exists with proper permissions
      file:
        path: "{{ app_dir }}/runtime/logs"
        state: directory
        owner: www-data
        group: www-data
        mode: 0775
        recurse: yes
      
    # Make sure assets directory is writable
    - name: Make sure assets directory is writable
      file:
        path: "{{ app_dir }}/web/assets"
        state: directory
        owner: www-data
        group: www-data
        mode: 0775
        recurse: yes
      
  post_tasks:
    - name: Show completion message
      debug:
        msg: "Yii2 application has been deployed successfully using Docker Swarm with the prebuilt image!" 