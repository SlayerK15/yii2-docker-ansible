---
# Comprehensive playbook to set up Yii2 application with Docker, Nginx, and Swarm

- name: Set up Yii2 application environment
  hosts: localhost
  connection: local
  become: yes
  vars:
    app_dir: "/opt/yii2-app"
    docker_dir: "{{ app_dir }}/docker"
    nginx_conf_dir: "/etc/nginx/sites-available"
    db_name: "yii2db"
    db_user: "yii2user"
    db_password: "yii2password" 
    db_root_password: "rootpassword"
    docker_image: "slayerop15/yii2-app:latest"
    
  tasks:
    #################################################
    # SECTION 1: Common Setup and Prerequisites
    #################################################
    - name: Common System Setup
      block:
        - name: Update apt cache
          apt:
            update_cache: yes
            cache_valid_time: 3600

        - name: Install common packages
          apt:
            name:
              - apt-transport-https
              - ca-certificates
              - curl
              - gnupg-agent
              - software-properties-common
              - python3-pip
              - git
            state: present

    #################################################
    # SECTION 2: Docker, Docker Compose, and Swarm
    #################################################
    - name: Docker Setup
      block:
        - name: Add Docker GPG key
          apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present

        - name: Add Docker repository
          apt_repository:
            repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present

        - name: Install Docker packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
              - docker-compose
            state: present
            update_cache: yes

        - name: Add user to docker group
          user:
            name: "{{ ansible_user_id }}"
            groups: docker
            append: yes

        - name: Ensure Docker is started and enabled
          systemd:
            name: docker
            state: started
            enabled: yes

    # Docker Swarm initialization (standalone tasks)
    - name: Check if Docker Swarm is already initialized
      command: docker info
      register: docker_info_result
      changed_when: false

    - name: Initialize Docker Swarm if not active
      command: docker swarm init --advertise-addr=127.0.0.1
      when: "'Swarm: active' not in docker_info_result.stdout"

    #################################################
    # SECTION 3: Directory Setup
    #################################################
    - name: Directory Setup
      block:
        - name: Create application directories
          file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "{{ app_dir }}"
            - "{{ docker_dir }}"
            - "{{ app_dir }}/data/mysql"
            - "{{ app_dir }}/data/app_runtime"
            - "{{ app_dir }}/data/app_assets"

    #################################################
    # SECTION 4: Nginx Installation and Configuration
    #################################################
    - name: Nginx Setup
      block:
        - name: Install Nginx
          apt:
            name: nginx
            state: present

        - name: Configure Nginx as reverse proxy
          copy:
            content: |
              server {
                  listen 80;
                  server_name localhost;
                  
                  access_log /var/log/nginx/yii2-access.log;
                  error_log /var/log/nginx/yii2-error.log;

                  root /var/www/html;
                  index index.php;

                  # Forward requests to PHP-FPM in the Docker container
                  location / {
                      try_files $uri $uri/ /index.php$is_args$args;
                  }

                  # Handle PHP files through FastCGI
                  location ~ \.php$ {
                      fastcgi_split_path_info ^(.+\.php)(/.+)$;
                      # Use Yii2 container's name and port
                      fastcgi_pass yii2-app:9000;
                      fastcgi_index index.php;
                      include fastcgi_params;
                      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                      fastcgi_param PATH_INFO $fastcgi_path_info;
                  }

                  # Deny access to hidden files
                  location ~ /\. {
                      deny all;
                  }
              }
            dest: "{{ nginx_conf_dir }}/yii2-app.conf"
            mode: '0644'

        - name: Enable Yii2 site config
          file:
            src: "{{ nginx_conf_dir }}/yii2-app.conf"
            dest: /etc/nginx/sites-enabled/yii2-app.conf
            state: link

        - name: Remove default site
          file:
            path: /etc/nginx/sites-enabled/default
            state: absent

        - name: Restart Nginx
          systemd:
            name: nginx
            state: restarted
            enabled: yes

    #################################################
    # SECTION 5: Docker Configuration Files
    #################################################
    - name: Docker Configuration Files
      block:
        - name: Create Docker Compose file
          copy:
            content: |
              version: '3.8'
              
              services:
                app:
                  image: {{ docker_image }}
                  ports:
                    - "9000:9000"
                  volumes:
                    - {{ app_dir }}/data/app_runtime:/var/www/html/runtime
                    - {{ app_dir }}/data/app_assets:/var/www/html/web/assets
                  environment:
                    - DB_HOST=db
                    - DB_DATABASE={{ db_name }}
                    - DB_USERNAME={{ db_user }}
                    - DB_PASSWORD={{ db_password }}
                    - YII_ENV=dev
                    - YII_DEBUG=true
                  networks:
                    - yii2-network
                  depends_on:
                    - db

                db:
                  image: mysql:8.0
                  restart: always
                  environment:
                    - MYSQL_DATABASE={{ db_name }}
                    - MYSQL_USER={{ db_user }}
                    - MYSQL_PASSWORD={{ db_password }}
                    - MYSQL_ROOT_PASSWORD={{ db_root_password }}
                  volumes:
                    - {{ app_dir }}/data/mysql:/var/lib/mysql
                  networks:
                    - yii2-network

              networks:
                yii2-network:
                  external: true
            dest: "{{ docker_dir }}/docker-compose.yml"
            mode: '0644'

        - name: Create Docker Stack file with explicit container names
          copy:
            content: |
              version: '3.8'
              
              services:
                app:
                  image: {{ docker_image }}
                  container_name: yii2-app
                  deploy:
                    replicas: 1
                    restart_policy:
                      condition: on-failure
                  ports:
                    - "9000:9000"
                  volumes:
                    - {{ app_dir }}/data/app_runtime:/var/www/html/runtime
                    - {{ app_dir }}/data/app_assets:/var/www/html/web/assets
                  networks:
                    - yii2-network
                  depends_on:
                    - db
                  environment:
                    - DB_HOST=db
                    - DB_DATABASE={{ db_name }}
                    - DB_USERNAME={{ db_user }}
                    - DB_PASSWORD={{ db_password }}
                    - YII_ENV=dev
                    - YII_DEBUG=true

                db:
                  image: mysql:8.0
                  container_name: yii2-db
                  deploy:
                    replicas: 1
                    restart_policy:
                      condition: on-failure
                  environment:
                    - MYSQL_DATABASE={{ db_name }}
                    - MYSQL_USER={{ db_user }}
                    - MYSQL_PASSWORD={{ db_password }}
                    - MYSQL_ROOT_PASSWORD={{ db_root_password }}
                  volumes:
                    - {{ app_dir }}/data/mysql:/var/lib/mysql
                  networks:
                    - yii2-network

              networks:
                yii2-network:
                  external: true
            dest: "{{ docker_dir }}/docker-stack.yml"
            mode: '0644'

        - name: Create .env file
          copy:
            content: |
              DB_DATABASE={{ db_name }}
              DB_USERNAME={{ db_user }}
              DB_PASSWORD={{ db_password }}
              DB_ROOT_PASSWORD={{ db_root_password }}
              DOCKER_IMAGE={{ docker_image }}
              YII_ENV=dev
              YII_DEBUG=true
            dest: "{{ docker_dir }}/.env"
            mode: '0600'

    #################################################
    # SECTION 6: Docker Image and Application Deployment
    #################################################
    - name: Deploy Application
      block:
        # Pull Docker image
        - name: Pull Docker image
          shell: docker pull {{ docker_image }}
          register: pull_result
          changed_when: pull_result.rc == 0

        # Create Docker network
        - name: Create Docker network if needed
          shell: docker network ls | grep -q yii2-network || docker network create -d overlay yii2-network
          changed_when: false

        # Clean up previous deployment
        - name: Clean up previous deployment
          shell: docker stack rm yii2-app || true
          ignore_errors: yes
          
        - name: Wait for cleanup
          pause:
            seconds: 10
            
        # Deploy with Docker Swarm
        - name: Deploy Docker Swarm stack
          shell: cd {{ docker_dir }} && docker stack deploy -c docker-stack.yml --prune yii2-app
          register: deploy_result
          changed_when: deploy_result.rc == 0
          
        - name: Wait for services to start
          pause:
            seconds: 10

    #################################################
    # SECTION 7: Verification and Diagnostics
    #################################################
    - name: Verify Deployment
      block:
        - name: Check Docker service status
          shell: docker service ls | grep yii2-app
          register: service_status
          changed_when: false
          
        - name: Display service status
          debug:
            var: service_status.stdout_lines
          
        - name: Check Docker container logs
          shell: docker service logs yii2-app_app --tail 20
          register: container_logs
          changed_when: false
          ignore_errors: yes
          
        - name: Display container logs
          debug:
            var: container_logs.stdout_lines
          when: container_logs.rc == 0
          
        - name: Verify Nginx proxy status
          shell: curl -s -I localhost | head -1
          register: nginx_status
          changed_when: false
          ignore_errors: yes
          
        - name: Display Nginx proxy status
          debug:
            var: nginx_status.stdout_lines
          when: nginx_status.rc == 0
          
        - name: Verify Nginx-to-container communication
          shell: |
            # Test FastCGI connection from Nginx to container
            echo "Checking if Nginx can connect to Yii2 container on port 9000..."
            nc -zv yii2-app 9000 || nc -zv localhost 9000
          register: connection_test
          changed_when: false
          ignore_errors: yes
          
        - name: Display connection test results
          debug:
            var: connection_test.stdout_lines
          when: connection_test.rc == 0
          
        - name: Display successful completion message
          debug:
            msg: "Yii2 application with Docker, Nginx, and Swarm has been successfully deployed!"

    # After setting up Nginx, add Nginx to the Docker network
    - name: Ensure Nginx can communicate with Docker containers
      block:
        # Add the nginx host to the Docker network
        - name: Discover host IP for Docker networking
          shell: |
            # Get the host IP
            HOST_IP=$(ip -4 addr show $(ip route | grep default | awk '{print $5}') | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
            echo "Host IP is $HOST_IP"
            
            # Check if the Docker network exists
            if docker network ls | grep -q yii2-network; then
              echo "Network exists"
            else
              # Create the network if it doesn't exist
              docker network create -d overlay yii2-network
            fi
          register: network_result
          changed_when: network_result.rc == 0

    # Add a task to update /etc/hosts to include Docker container DNS entries
    - name: Update /etc/hosts for Docker container DNS resolution
      shell: |
        # Get container IP
        if docker ps -q --filter "name=yii2-app"; then
          CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' yii2-app)
          if grep -q "yii2-app" /etc/hosts; then
            sed -i "s/.*yii2-app.*/$CONTAINER_IP yii2-app/" /etc/hosts
          else
            echo "$CONTAINER_IP yii2-app" >> /etc/hosts
          fi
          echo "Added yii2-app to /etc/hosts with IP $CONTAINER_IP"
        else
          echo "Container yii2-app not running yet"
        fi
      register: hosts_update
      changed_when: hosts_update.rc == 0
      ignore_errors: yes
