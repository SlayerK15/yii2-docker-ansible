---
# Container setup tasks - pulling pre-built Docker image

- name: Create app directories for Docker volumes
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  with_items:
    - "{{ app_dir }}/runtime"
    - "{{ app_dir }}/web/assets"
    - "{{ app_dir }}/data/mysql"

- name: Pull Docker image from Docker Hub
  docker_image:
    name: slayerop15/yii2-app:latest
    source: pull
    state: present
  become: true

# Extract web files from the container to host for Nginx to serve them
- name: Create temporary container to extract web files
  docker_container:
    name: temp-yii2-extract
    image: slayerop15/yii2-app:latest
    command: sleep 10
    detach: true
  become: true

- name: Wait for container to start
  wait_for:
    timeout: 5

- name: Copy web files from container to host
  shell: docker cp temp-yii2-extract:/var/www/web {{ app_dir }}/
  become: true

- name: Remove temporary container
  docker_container:
    name: temp-yii2-extract
    state: absent
  become: true

- name: Fix permissions for web directory
  file:
    path: "{{ app_dir }}/web"
    state: directory
    mode: '0755'
    owner: www-data
    group: www-data
    recurse: yes
  become: true

- name: Create .env file for Docker configuration
  copy:
    content: |
      DB_DATABASE={{ db_name }}
      DB_USERNAME={{ db_user }}
      DB_PASSWORD={{ db_password }}
      DB_ROOT_PASSWORD={{ db_root_password }}
      APP_VERSION=latest
      YII_ENV=dev
      YII_DEBUG=true
    dest: "{{ app_dir }}/.env"
    mode: '0600'

# Create a diagnostic PHP info file
- name: Create phpinfo.php for diagnostics
  copy:
    content: |
      <?php
      // Show PHP information for diagnostics
      phpinfo();
    dest: "{{ app_dir }}/web/phpinfo.php"
    mode: '0644'

# Create additional test files for troubleshooting
- name: Create test PHP file
  copy:
    content: |
      <?php
      // Simple test script
      error_reporting(E_ALL);
      ini_set('display_errors', 1);
      echo "PHP Test Script is working!";
      echo "<pre>";
      print_r($_SERVER);
      echo "</pre>";
    dest: "{{ app_dir }}/web/test.php"
    mode: '0644'
    owner: www-data
    group: www-data
  become: true

- name: Create simple HTML test file
  copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head>
        <title>HTML Test Page</title>
      </head>
      <body>
        <h1>HTML Test Page</h1>
        <p>If you can see this, Nginx is serving static files correctly.</p>
      </body>
      </html>
    dest: "{{ app_dir }}/web/test.html"
    mode: '0644'
    owner: www-data
    group: www-data
  become: true 