---
# Container setup tasks - pulling pre-built Docker image

- name: Create app directories for Docker volumes
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: '0755'
  with_items:
    - "{{ app_dir }}/runtime"
    - "{{ app_dir }}/web/assets"
    - "{{ app_dir }}/data/mysql"

- name: Pull Docker image from Docker Hub
  docker_image:
    name: slayerop15/yii2-app:latest
    source: pull
    state: present
  become: true

- name: Create .env file for Docker configuration
  copy:
    content: |
      DB_DATABASE={{ db_name }}
      DB_USERNAME={{ db_user }}
      DB_PASSWORD={{ db_password }}
      DB_ROOT_PASSWORD={{ db_root_password }}
      APP_VERSION=latest
      YII_ENV=dev
      YII_DEBUG=true
    dest: "{{ app_dir }}/.env"
    mode: '0600'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"

# Create a diagnostic PHP info file
- name: Create phpinfo.php for diagnostics
  copy:
    content: |
      <?php
      // Show PHP information for diagnostics
      phpinfo();
    dest: "{{ app_dir }}/web/phpinfo.php"
    mode: '0644'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}" 