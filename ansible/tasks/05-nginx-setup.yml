---
# Nginx setup tasks for host machine

- name: Install Nginx on host
  apt:
    name: nginx
    state: present
  when: ansible_os_family == 'Debian'

- name: Create Nginx configuration directory
  file:
    path: "{{ app_dir }}/nginx"
    state: directory
    mode: '0755'

- name: Add Docker container to hosts file
  lineinfile:
    path: /etc/hosts
    line: "172.17.0.1 yii2app_app"
    state: present
  become: true

- name: Create Nginx configuration for host
  template:
    src: nginx-site.conf.j2
    dest: /etc/nginx/sites-available/yii2-app.conf
    mode: '0644'
  become: true
  notify: Restart Nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/yii2-app.conf
    dest: /etc/nginx/sites-enabled/yii2-app.conf
    state: link
  become: true
  notify: Restart Nginx

- name: Remove default Nginx site if it exists
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: Restart Nginx 