---
# Common setup tasks

- name: Install basic dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - unzip
      - git
      - python3-pip
      - python3-yaml  # Install PyYAML via apt
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Set up system timezone
  timezone:
    name: UTC

- name: Check if jsondiff is installed
  command: dpkg-query -W python3-jsondiff
  register: jsondiff_check
  failed_when: false
  changed_when: false

- name: Install jsondiff with pip if not available via apt
  pip:
    name: jsondiff
    state: present
    extra_args: --break-system-packages
  become: true
  when: jsondiff_check.rc != 0
  ignore_errors: true

- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  with_items:
    - "{{ app_dir }}"
    - "{{ app_dir }}/data/mysql"
    - "{{ app_dir }}/docker"
    - "{{ app_dir }}/nginx"
    - "{{ app_dir }}/logs" 